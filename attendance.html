<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Location-Verified Attendance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      background-color: #f4f4f4;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #1488cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0d6ba0;
    }
    #status {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-line;
    }
    #formFrame {
      margin-top: 30px;
      width: 90%;
      height: 600px;
      border: none;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Attendance System</h1>
  <button onclick="verifyLocation()">Mark Attendance</button>

  <div id="status"></div>
  <iframe id="formFrame"></iframe>

  <script>
    async function verifyLocation() {
      const statusEl = document.getElementById('status');
      const iframeEl = document.getElementById('formFrame');
      statusEl.innerText = "Getting your location...";

      if (!navigator.geolocation) {
        statusEl.innerText = "Geolocation is not supported by your browser.";
        return;
      }

      navigator.geolocation.getCurrentPosition(async (position) => {
        const userLat = position.coords.latitude;
        const userLon = position.coords.longitude;

        statusEl.innerText = "Verifying location...";

        try {
          const response = await fetch("https://gnlfh7fsh9.execute-api.ap-south-1.amazonaws.com/default/attendance_lambda", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              latitude: userLat,
              longitude: userLon
            })
          });

          const data = await response.json();

          if (data.authorized) {
            statusEl.innerText = "Location verified. Loading attendance form...";
            iframeEl.src = data.form_url;
            iframeEl.style.display = "block";
          } else {
            iframeEl.style.display = "none";
            statusEl.innerText = `Access denied. Distance from allowed location: ${data.distance || '?'} km.`;
          }

        } catch (error) {
          console.error("Error:", error);
          statusEl.innerText = "Something went wrong.";
        }

      }, (err) => {
        console.error("Location error:", err);
        statusEl.innerText = "Unable to get location. Please allow access.";
      });
    }
  </script>

</body>
</html>
