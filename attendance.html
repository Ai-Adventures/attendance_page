<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Location-Verified Attendance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      background-color: #f4f4f4;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #1488cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0d6ba0;
    }
    #status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Attendance System</h1>
  <button onclick="fetchAttendance()">Fetch Attendance</button>

  <div id="status"></div>

  <script>
    async function fetchAttendance() {
      document.getElementById('status').innerText = "Getting your location...";

      if (!navigator.geolocation) {
        document.getElementById('status').innerText = "Geolocation is not supported by your browser.";
        return;
      }

      navigator.geolocation.getCurrentPosition(async (position) => {
        const userLat = position.coords.latitude;
        const userLon = position.coords.longitude;

        document.getElementById('status').innerText = "Verifying location...";

        try {
          const response = await fetch("https://<YOUR_API_GATEWAY_URL>/prod/attendance");
          const data = await response.json();

          const allowedLat = data.latitude;
          const allowedLon = data.longitude;
          const tallyUrl = data.tally_url;

          const distance = getDistanceFromLatLonInKm(userLat, userLon, allowedLat, allowedLon);

          if (distance <= 0.1) {
            document.getElementById('status').innerText = "Location verified. Redirecting to attendance form...";
            window.location.href = tallyUrl;
          } else {
            document.getElementById('status').innerText = `You are not at the authorized location.\nDistance: ${distance.toFixed(3)} km`;
          }

        } catch (error) {
          console.error("Error fetching attendance config:", error);
          document.getElementById('status').innerText = "Failed to fetch attendance configuration.";
        }
      }, (error) => {
        document.getElementById('status').innerText = "Unable to retrieve your location.";
      });
    }

    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = deg2rad(lat2 - lat1);
      const dLon = deg2rad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function deg2rad(deg) {
      return deg * (Math.PI / 180);
    }
  </script>

</body>
</html>
