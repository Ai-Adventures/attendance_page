<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance Fetcher</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; }
    #response { margin-top: 1rem; white-space: pre-wrap; background: #f0f0f0; padding: 1rem; border-radius: 6px; }
    button { padding: 0.6rem 1rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h2>Fetch Attendance</h2>
  <button onclick="fetchAttendance()">Get Attendance</button>
  <div id="response">Click the button to load attendance data.</div>

  <script>
    async function fetchAttendance() {
      const responseBox = document.getElementById('response');
      responseBox.innerText = "Fetching attendance data...";

      try {
        const response = await fetch('https://gnlfh7fsh9.execute-api.ap-south-1.amazonaws.com/default/attendance_lambda', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error("HTTP error " + response.status);
        }

        const data = await response.json();
        responseBox.innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        responseBox.innerText = "Error: " + err.message;
        console.error(err);
      }
    }
  </script>
</body>
</html>
