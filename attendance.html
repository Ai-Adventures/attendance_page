<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Location-Verified Attendance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      background-color: #f4f4f4;
      margin: 0;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #1488cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0d6ba0;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-line;
    }

    .iframe-container {
      margin-top: 30px;
      display: flex;
      justify-content: center;
    }

    #formFrame {
      width: 100%;
      max-width: 900px;
      height: 1000px;
      border: none;
      display: none;
      overflow: hidden;
    }

    /* Optional: remove scroll from body if iframe causes it */
    html, body {
      overflow-x: hidden;
    }

    .logo {
    width: 500px;
    margin: 10px 0;
  }
  </style>

</head>
<body>
  <img src="https://raw.githubusercontent.com/ai-adventures/attendance_page/main/aiadventures.png" 
     alt="AIAdventures Logo" 
     class="logo" />
  <h1>Attendance System</h1>
  <button onclick="fetchAttendance()">Mark your Attendance</button>

  <div id="status"></div>

  <div class="iframe-container">
    <iframe
  id="formFrame"
  style="margin: 30px auto; width: 90%; height: 600px; border: none; display: none;"
  sandbox="allow-scripts allow-same-origin allow-forms"
  allow="clipboard-write"></iframe>
  </div>

  <script>
    async function fetchAttendance() {
      const statusEl = document.getElementById('status');
      const iframeEl = document.getElementById('formFrame');
      statusEl.innerText = "Getting your location...";

      if (!navigator.geolocation) {
        statusEl.innerText = "Geolocation is not supported by your browser.";
        return;
      }

      navigator.geolocation.getCurrentPosition(async (position) => {
        const userLat = position.coords.latitude;
        const userLon = position.coords.longitude;

        statusEl.innerText = "Verifying location...";

        try {
          const response = await fetch("https://gnlfh7fsh9.execute-api.ap-south-1.amazonaws.com/default/attendance_lambda");

          if (!response.ok) {
            throw new Error("HTTP error " + response.status);
          }

          const data = await response.json();
          const allowedLat = data.latitude;
          const allowedLon = data.longitude;
          const tallyUrl = data.tally_url;

          const distance = getDistanceFromLatLonInKm(userLat, userLon, allowedLat, allowedLon);

          if (distance <= 0.1) {
            statusEl.innerText = "Location verified. Loading attendance form...";
            iframeEl.src = tallyUrl;
            iframeEl.style.display = "block";
          } else {
            iframeEl.style.display = "none";
            statusEl.innerText = `You are not at the authorized location.\nDistance from target: ${distance.toFixed(3)} km`;
          }

        } catch (error) {
          console.error("Error fetching attendance config:", error);
          statusEl.innerText = "Failed to fetch attendance configuration.";
        }

      }, (error) => {
        statusEl.innerText = "Unable to retrieve your location. Please allow location access.";
      });
    }

    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = deg2rad(lat2 - lat1);
      const dLon = deg2rad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function deg2rad(deg) {
      return deg * (Math.PI / 180);
    }
  </script>

</body>
</html>
